<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ABYSS PANEL</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root[data-theme="dark"] {
  --bg: #07080f;
  --surface: #0d1017;
  --surface2: #131720;
  --surface3: #1a1f2e;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8eaf0;
  --text2: #8892a4;
  --text3: #5a6478;
  --accent: #2563eb;
  --accent-glow: rgba(37,99,235,0.25);
  --accent-light: #3b82f6;
  --success: #059669;
  --success-bg: rgba(5,150,105,0.12);
  --danger: #dc2626;
  --danger-bg: rgba(220,38,38,0.12);
  --warning: #d97706;
  --warning-bg: rgba(217,119,6,0.12);
  --dev: #7c3aed;
  --dev-bg: rgba(124,58,237,0.12);
  --gold: #b45309;
  --gold-bg: rgba(180,83,9,0.12);
  --sidebar-w: 240px;
  --header-h: 60px;
  --radius: 10px;
  --radius-lg: 16px;
}
:root[data-theme="light"] {
  --bg: #f0f2f7;
  --surface: #ffffff;
  --surface2: #f8f9fc;
  --surface3: #eef0f6;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #0d1017;
  --text2: #4a5568;
  --text3: #8892a4;
  --accent: #2563eb;
  --accent-glow: rgba(37,99,235,0.15);
  --accent-light: #3b82f6;
  --success: #059669;
  --success-bg: rgba(5,150,105,0.08);
  --danger: #dc2626;
  --danger-bg: rgba(220,38,38,0.08);
  --warning: #d97706;
  --warning-bg: rgba(217,119,6,0.08);
  --dev: #7c3aed;
  --dev-bg: rgba(124,58,237,0.08);
  --gold: #b45309;
  --gold-bg: rgba(180,83,9,0.08);
  --sidebar-w: 240px;
  --header-h: 60px;
  --radius: 10px;
  --radius-lg: 16px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  font-size:14px;
  line-height:1.5;
}
code,pre,.mono{font-family:'JetBrains Mono',monospace;}

/* ─── Scrollbar ─── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}

/* ─── Animations ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes shimmer{0%{background-position:-400px 0;}100%{background-position:400px 0;}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
@keyframes slideIn{from{transform:translateX(-12px);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes toastIn{from{transform:translateX(120%);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes toastOut{from{transform:translateX(0);opacity:1;}to{transform:translateX(120%);opacity:0;}}
@keyframes modalIn{from{transform:scale(.94) translateY(10px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}

.fade-up{animation:fadeUp .4s ease both;}
.fade-in{animation:fadeIn .3s ease both;}

/* ─── Login Screen ─── */
#login-screen{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
  z-index:1000;
}
.login-wrap{
  width:100%;max-width:420px;padding:0 24px;
  animation:fadeUp .5s ease;
}
.login-logo{
  text-align:center;margin-bottom:40px;
}
.login-logo .brand{
  font-family:'JetBrains Mono',monospace;
  font-size:28px;font-weight:700;letter-spacing:4px;
  color:var(--text);
}
.login-logo .brand span{color:var(--accent);}
.login-logo .tagline{
  font-size:11px;color:var(--text3);letter-spacing:2px;
  text-transform:uppercase;margin-top:6px;
}
.login-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:32px;
}
.form-group{margin-bottom:18px;}
.form-label{
  display:block;font-size:12px;font-weight:600;
  color:var(--text2);letter-spacing:.5px;
  text-transform:uppercase;margin-bottom:8px;
}
.form-input{
  width:100%;padding:11px 14px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  color:var(--text);font-family:inherit;font-size:14px;
  transition:border-color .2s, box-shadow .2s;
  outline:none;
}
.form-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}
.form-input::placeholder{color:var(--text3);}
.captcha-box{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:12px 14px;
  display:flex;align-items:center;gap:12px;
  margin-bottom:18px;
}
.captcha-question{
  font-family:'JetBrains Mono',monospace;
  font-size:16px;font-weight:600;color:var(--accent);
  flex:1;
}
.captcha-input{
  width:80px;text-align:center;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:6px;
  color:var(--text);font-family:'JetBrains Mono',monospace;
  font-size:16px;padding:6px 10px;outline:none;
}
.captcha-input:focus{border-color:var(--accent);}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 18px;border-radius:var(--radius);
  font-family:inherit;font-size:14px;font-weight:600;
  border:none;cursor:pointer;transition:all .2s;
  text-decoration:none;white-space:nowrap;
}
.btn-primary{
  background:var(--accent);color:#fff;width:100%;
  justify-content:center;padding:13px;
}
.btn-primary:hover{background:var(--accent-light);transform:translateY(-1px);}
.btn-primary:active{transform:translateY(0);}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--surface3);border-color:var(--border2);}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(220,38,38,.2);}
.btn-danger:hover{background:var(--danger);color:#fff;}
.btn-success{background:var(--success-bg);color:var(--success);border:1px solid rgba(5,150,105,.2);}
.btn-success:hover{background:var(--success);color:#fff;}
.btn-sm{padding:7px 12px;font-size:12px;}
.btn-xs{padding:4px 9px;font-size:11px;}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;}

/* ─── App Layout ─── */
#app{display:none;min-height:100vh;}
.layout{display:flex;min-height:100vh;}

/* ─── Sidebar ─── */
.sidebar{
  width:var(--sidebar-w);
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;
  z-index:100;
  transition:transform .3s ease;
}
.sidebar-logo{
  padding:20px 20px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.sidebar-logo .logo-text{
  font-family:'JetBrains Mono',monospace;
  font-size:16px;font-weight:700;letter-spacing:3px;
}
.sidebar-logo .logo-text span{color:var(--accent);}
.logo-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 8px var(--accent);
  animation:pulse 2s infinite;
}
.sidebar-section{
  padding:8px 10px 0;
}
.sidebar-section-label{
  font-size:10px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--text3);
  padding:10px 10px 6px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:8px;
  color:var(--text2);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .2s;
  margin-bottom:2px;
  position:relative;
}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{
  background:var(--accent-glow);color:var(--accent-light);
}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:3px;border-radius:0 3px 3px 0;
  background:var(--accent);
}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
.nav-badge{
  margin-left:auto;font-size:10px;font-weight:700;
  background:var(--accent);color:#fff;
  padding:2px 6px;border-radius:99px;
}
.sidebar-bottom{
  margin-top:auto;padding:16px;
  border-top:1px solid var(--border);
}
.user-card{
  display:flex;align-items:center;gap:10px;
  padding:10px;border-radius:var(--radius);
  background:var(--surface2);cursor:pointer;
  transition:background .2s;
}
.user-card:hover{background:var(--surface3);}
.avatar{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;flex-shrink:0;
}
.user-info{flex:1;min-width:0;}
.user-info .name{font-size:13px;font-weight:600;truncate:ellipsis;white-space:nowrap;overflow:hidden;}
.user-info .role{font-size:11px;color:var(--text3);}

/* ─── Main Content ─── */
.main{
  margin-left:var(--sidebar-w);
  flex:1;display:flex;flex-direction:column;min-height:100vh;
}
.topbar{
  height:var(--header-h);
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;
  gap:16px;
  position:sticky;top:0;z-index:50;
}
.page-title{
  font-size:16px;font-weight:700;flex:1;
}
.topbar-actions{display:flex;align-items:center;gap:10px;}
.theme-toggle{
  width:36px;height:36px;border-radius:8px;
  background:var(--surface2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;transition:all .2s;
}
.theme-toggle:hover{background:var(--surface3);}
.content{padding:24px;flex:1;}

/* ─── Cards ─── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:20px;
}
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.card-title{font-size:14px;font-weight:700;}
.card-sub{font-size:12px;color:var(--text2);}

/* ─── Stat Cards ─── */
.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:16px;margin-bottom:24px;
}
.stat-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:20px;
  position:relative;overflow:hidden;
  transition:border-color .2s, transform .2s;
  animation:fadeUp .4s ease both;
}
.stat-card:hover{
  border-color:var(--border2);
  transform:translateY(-2px);
}
.stat-card::after{
  content:'';position:absolute;
  top:0;right:0;width:60px;height:60px;
  border-radius:0 var(--radius-lg) 0 60px;
  opacity:.06;
}
.stat-card.accent::after{background:var(--accent);}
.stat-card.success::after{background:var(--success);}
.stat-card.warning::after{background:var(--warning);}
.stat-card.danger::after{background:var(--danger);}
.stat-card.dev::after{background:var(--dev);}
.stat-label{
  font-size:11px;font-weight:600;letter-spacing:.5px;
  text-transform:uppercase;color:var(--text3);margin-bottom:10px;
}
.stat-value{
  font-family:'JetBrains Mono',monospace;
  font-size:28px;font-weight:700;color:var(--text);
  line-height:1;margin-bottom:8px;
}
.stat-value.sm{font-size:22px;}
.stat-delta{
  font-size:12px;display:flex;align-items:center;gap:4px;
}
.delta-up{color:var(--success);}
.delta-down{color:var(--danger);}
.stat-icon{
  position:absolute;top:18px;right:18px;
  font-size:22px;opacity:.5;
}

/* ─── Grid layouts ─── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
@media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr;}}

/* ─── Tables ─── */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead th{
  padding:10px 14px;
  text-align:left;
  font-size:11px;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;color:var(--text3);
  border-bottom:1px solid var(--border);
  white-space:nowrap;
}
tbody tr{
  border-bottom:1px solid var(--border);
  transition:background .15s;
}
tbody tr:hover{background:var(--surface2);}
tbody tr:last-child{border-bottom:none;}
td{
  padding:12px 14px;font-size:13px;color:var(--text2);
  vertical-align:middle;
}
td .mono{font-size:12px;color:var(--text);}
.table-actions{display:flex;gap:6px;}

/* ─── Badges ─── */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:99px;
  font-size:11px;font-weight:600;white-space:nowrap;
}
.badge-success{background:var(--success-bg);color:var(--success);}
.badge-danger{background:var(--danger-bg);color:var(--danger);}
.badge-warning{background:var(--warning-bg);color:var(--warning);}
.badge-accent{background:var(--accent-glow);color:var(--accent-light);}
.badge-dev{background:var(--dev-bg);color:var(--dev);}
.badge-gold{background:var(--gold-bg);color:var(--gold);}
.badge-neutral{background:var(--surface3);color:var(--text2);}
.badge::before{content:'●';font-size:6px;}

/* ─── Pagination ─── */
.pagination{
  display:flex;align-items:center;gap:6px;
  justify-content:flex-end;padding-top:16px;
}
.page-btn{
  width:32px;height:32px;border-radius:6px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text2);font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.page-btn:hover{background:var(--surface3);color:var(--text);}
.page-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.page-info{font-size:12px;color:var(--text3);margin-right:auto;}

/* ─── Filters bar ─── */
.filters{
  display:flex;gap:10px;align-items:center;
  flex-wrap:wrap;margin-bottom:16px;
}
.search-box{
  position:relative;flex:1;min-width:180px;
}
.search-box input{
  width:100%;padding:9px 14px 9px 36px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  color:var(--text);font-family:inherit;font-size:13px;outline:none;
  transition:border-color .2s;
}
.search-box input:focus{border-color:var(--accent);}
.search-icon{
  position:absolute;left:11px;top:50%;transform:translateY(-50%);
  color:var(--text3);font-size:14px;pointer-events:none;
}
select.filter-select{
  padding:9px 12px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  color:var(--text);font-family:inherit;font-size:13px;
  outline:none;cursor:pointer;
  transition:border-color .2s;
}
select.filter-select:focus{border-color:var(--accent);}

/* ─── Progress bars ─── */
.progress{
  height:6px;background:var(--surface3);border-radius:99px;overflow:hidden;
}
.progress-bar{
  height:100%;border-radius:99px;
  transition:width .6s cubic-bezier(.4,0,.2,1);
}
.progress-lg{height:10px;}

/* ─── Modals ─── */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.65);backdrop-filter:blur(4px);
  z-index:500;display:flex;align-items:center;justify-content:center;
  padding:20px;
  animation:fadeIn .2s ease;
}
.modal{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:var(--radius-lg);
  width:100%;max-width:500px;
  max-height:90vh;overflow-y:auto;
  animation:modalIn .25s ease;
}
.modal-lg{max-width:700px;}
.modal-header{
  padding:20px 24px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{
  width:28px;height:28px;border-radius:6px;
  background:var(--surface2);border:none;
  color:var(--text2);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.modal-close:hover{background:var(--danger-bg);color:var(--danger);}
.modal-body{padding:20px 24px;}
.modal-footer{
  padding:16px 24px;
  border-top:1px solid var(--border);
  display:flex;gap:10px;justify-content:flex-end;
}

/* ─── Toasts ─── */
#toast-container{
  position:fixed;right:20px;bottom:20px;
  display:flex;flex-direction:column-reverse;gap:8px;z-index:9999;
}
.toast{
  padding:12px 18px;border-radius:var(--radius);
  display:flex;align-items:center;gap:10px;
  font-size:13px;font-weight:500;min-width:250px;max-width:380px;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
  animation:toastIn .3s ease;
  cursor:pointer;
}
.toast.hide{animation:toastOut .3s ease forwards;}
.toast-success{background:var(--success);color:#fff;}
.toast-danger{background:var(--danger);color:#fff;}
.toast-warning{background:var(--warning);color:#fff;}
.toast-info{background:var(--accent);color:#fff;}
.toast-icon{font-size:16px;}

/* ─── Spinner / Loading ─── */
.spinner{
  width:20px;height:20px;border-radius:50%;
  border:2px solid var(--border2);
  border-top-color:var(--accent);
  animation:spin .7s linear infinite;
  flex-shrink:0;
}
.spinner-lg{width:36px;height:36px;border-width:3px;}
.loading-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;padding:40px;color:var(--text3);font-size:13px;
}
.shimmer{
  background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);
  background-size:800px 100%;
  animation:shimmer 1.5s infinite;
  border-radius:6px;
}

/* ─── Charts ─── */
.chart-wrap{position:relative;width:100%;}
canvas{display:block;width:100%!important;}
.chart-legend{
  display:flex;gap:16px;flex-wrap:wrap;
  padding-top:12px;
}
.legend-item{
  display:flex;align-items:center;gap:6px;
  font-size:12px;color:var(--text2);
}
.legend-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
}

/* ─── Heatmap ─── */
.heatmap{
  display:grid;gap:3px;
}
.heatmap-cell{
  border-radius:3px;cursor:pointer;
  transition:transform .15s;
  aspect-ratio:1;
}
.heatmap-cell:hover{transform:scale(1.3);z-index:1;}
.heatmap-labels{
  display:flex;justify-content:space-between;
  font-size:10px;color:var(--text3);
  font-family:'JetBrains Mono',monospace;
  margin-bottom:4px;
}

/* ─── Upload zone ─── */
.upload-zone{
  border:2px dashed var(--border2);
  border-radius:var(--radius-lg);
  padding:40px;text-align:center;
  cursor:pointer;transition:all .2s;
  background:var(--surface2);
}
.upload-zone:hover,.upload-zone.drag{
  border-color:var(--accent);background:var(--accent-glow);
}
.upload-icon{font-size:40px;margin-bottom:12px;opacity:.5;}
.upload-text{font-size:14px;color:var(--text2);}
.upload-sub{font-size:12px;color:var(--text3);margin-top:4px;}
#file-input{display:none;}

/* ─── Range stock bar ─── */
.stock-bar{
  display:flex;align-items:center;gap:10px;
  padding:12px 0;border-bottom:1px solid var(--border);
}
.stock-bar:last-child{border-bottom:none;}
.stock-info{flex:1;min-width:0;}
.stock-name{font-size:13px;font-weight:600;}
.stock-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.stock-nums{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;color:var(--text2);white-space:nowrap;
}

/* ─── Code/Terminal box ─── */
.terminal{
  background:#000;
  border:1px solid var(--border2);
  border-radius:var(--radius);

<body>

<!-- ─── LOGIN ─── -->

<script>
// ═══════════════════════════════════════════════════════
//  ABYSS PANEL — Frontend Core
// ═══════════════════════════════════════════════════════

const TOKEN_KEY = 'abyss_token';
let currentUser = null;
let currentPage = null;
let captchaAnswer = 0;

// ─── API Layer ───────────────────────────────────────
const api = {
  base: '/api',
  headers() {
    const t = localStorage.getItem(TOKEN_KEY);
    return { 'Content-Type':'application/json', ...(t ? {'Authorization':'Bearer '+t} : {}) };
  },
  async req(method, path, body, opts={}) {
    const url = this.base + path;
    const res = await fetch(url, {
      method, headers: this.headers(),
      body: body ? JSON.stringify(body) : undefined,
      ...opts
    });
    if (res.status === 401) { logout(); return null; }
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || data.message || 'Request failed');
    return data;
  },
  get(path) { return this.req('GET', path); },
  post(path, body) { return this.req('POST', path, body); },
  put(path, body) { return this.req('PUT', path, body); },
  patch(path, body) { return this.req('PATCH', path, body); },
  delete(path) { return this.req('DELETE', path); },
  async upload(path, formData) {
    const t = localStorage.getItem(TOKEN_KEY);
    const res = await fetch(this.base + path, {
      method: 'POST',
      headers: t ? {'Authorization':'Bearer '+t} : {},
      body: formData
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Upload failed');
    return data;
  }
};

// ─── Toast ───────────────────────────────────────────
function showToast(msg, type='info', duration=3500) {
  const icons = { success:'✓', danger:'✕', warning:'⚠', info:'ℹ' };
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `<span class="toast-icon">${icons[type]||'ℹ'}</span><span>${msg}</span>`;
  el.onclick = () => { el.classList.add('hide'); setTimeout(() => el.remove(), 300); };
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => { el.classList.add('hide'); setTimeout(() => el.remove(), 300); }, duration);
}

// ─── Modal ───────────────────────────────────────────
function showModal(title, html, buttons=[], opts={}) {
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'active-modal';
  overlay.innerHTML = `
    <div class="modal ${opts.large?'modal-lg':''}">
      <div class="modal-header">
        <div class="modal-title">${title}</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">${html}</div>
      ${buttons.length ? `<div class="modal-footer">${buttons.map(b=>`
        <button class="btn ${b.cls||'btn-secondary'}" onclick="${b.action}">${b.label}</button>
      `).join('')}</div>` : ''}
    </div>`;
  overlay.addEventListener('click', e => { if(e.target === overlay) closeModal(); });
  document.getElementById('modal-container').appendChild(overlay);
}
function closeModal() {
  const m = document.getElementById('active-modal');
  if (m) m.remove();
}

// ─── Captcha ─────────────────────────────────────────
function newCaptcha() {
  const ops = [
    ['+', (a,b) => a+b],
    ['-', (a,b) => a-b],
    ['×', (a,b) => a*b]
  ];
  const [sym, fn] = ops[Math.floor(Math.random()*ops.length)];
  let a = Math.floor(Math.random()*9)+1;
  let b = Math.floor(Math.random()*9)+1;
  if (sym === '-' && b > a) [a,b] = [b,a];
  captchaAnswer = fn(a,b);
  document.getElementById('captcha-question').textContent = `${a} ${sym} ${b} = ?`;
  document.getElementById('captcha-ans').value = '';
}

// ─── Auth ─────────────────────────────────────────────
async function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  const ans  = parseInt(document.getElementById('captcha-ans').value);
  const err  = document.getElementById('login-err');
  err.style.display = 'none';

  if (!user || !pass) { showErr('Enter username and password'); return; }
  if (ans !== captchaAnswer) { showErr('Captcha answer incorrect'); newCaptcha(); return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Signing in...';

  try {
    const data = await api.post('/auth/login', { username:user, password:pass });
    localStorage.setItem(TOKEN_KEY, data.token);
    await loadApp();
  } catch(e) {
    showErr(e.message);
    newCaptcha();
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Sign In';
  }

  function showErr(msg) {
    err.textContent = msg;
    err.style.display = 'block';
  }
}

function doLogout() {
  logout();
}
function logout() {
  localStorage.removeItem(TOKEN_KEY);
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  newCaptcha();
}

// ─── App Bootstrap ────────────────────────────────────
async function loadApp() {
  try {
    currentUser = await api.get('/auth/me');
    if (!currentUser) return;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    buildSidebar();
    updateSidebarUser();
    const defaultPage = currentUser.role === 'user' ? 'dashboard' : 'admin-dashboard';
    showPage(defaultPage);
  } catch(e) {
    logout();
  }
}

// ─── Theme ────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('abyss_theme', next);
  document.querySelector('.theme-toggle').textContent = next === 'dark' ? '🌙' : '☀️';
}

// ─── Sidebar Builder ──────────────────────────────────
function buildSidebar() {
  const role = currentUser?.role;
  const isAdmin = role === 'superadmin' || role === 'dev';

  const userPages = [
    { id:'dashboard',   icon:'📊', label:'Dashboard' },
    { id:'my-numbers',  icon:'📱', label:'My Numbers' },
    { id:'sms-test',    icon:'✉️',  label:'SMS Test' },
    { id:'cdr-stats',   icon:'📋', label:'CDR Stats' },
    { id:'analytics',   icon:'📈', label:'Analytics' },
    { id:'profile',     icon:'👤', label:'Profile' },
  ];

  const adminPages = [
    { section: 'ADMIN' },
    { id:'admin-dashboard', icon:'🖥️', label:'Admin Dashboard' },
    { id:'users',           icon:'👥', label:'Users' },
    { id:'upload-range',    icon:'📤', label:'Upload Range' },
    { id:'ranges',          icon:'🗂️', label:'Ranges & Stock' },
    { id:'allocate',        icon:'🔀', label:'Allocate Numbers' },
    { id:'all-numbers',     icon:'🔢', label:'All Numbers' },
    { id:'traffic-monitor', icon:'📡', label:'Traffic Monitor' },
    { id:'deep-analytics',  icon:'🔬', label:'Deep Analytics' },
    { id:'targets',         icon:'🎯', label:'Targets' },
    { id:'settings',        icon:'⚙️', label:'Settings' },
    ...(role === 'superadmin' ? [{ id:'dev-codes', icon:'🔑', label:'Dev Codes' }] : []),
  ];

  const pages = isAdmin ? [...userPages, ...adminPages] : userPages;
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';

  let inSection = false;
  pages.forEach(p => {
    if (p.section) {
      const sec = document.createElement('div');
      sec.className = 'sidebar-section-label';
      sec.textContent = p.section;
      nav.appendChild(sec);
      inSection = true;
      return;
    }
    const item = document.createElement('div');
    item.className = 'nav-item';
    item.dataset.page = p.id;
    item.innerHTML = `<span class="nav-icon">${p.icon}</span>${p.label}`;
    item.onclick = () => showPage(p.id);
    if (!inSection) {
      const sec = document.createElement('div');
      sec.className = 'sidebar-section';
      sec.appendChild(item);
      nav.appendChild(sec);
    } else {
      const lastSec = nav.lastElementChild;
      if (lastSec.classList.contains('sidebar-section')) {
        lastSec.appendChild(item);
      } else {
        const sec = document.createElement('div');
        sec.className = 'sidebar-section';
        sec.appendChild(item);
        nav.appendChild(sec);
      }
    }
  });
}

function updateSidebarUser() {
  const u = currentUser;
  if (!u) return;
  document.getElementById('sb-name').textContent = u.name || u.username;
  document.getElementById('sb-role').textContent = u.role;
  document.getElementById('sb-avatar').textContent = (u.name || u.username).charAt(0).toUpperCase();
  const colors = { superadmin:'var(--gold-bg)', dev:'var(--dev-bg)', user:'var(--accent-glow)' };
  const textColors = { superadmin:'var(--gold)', dev:'var(--dev)', user:'var(--accent-light)' };
  document.getElementById('sb-avatar').style.background = colors[u.role] || colors.user;
  document.getElementById('sb-avatar').style.color = textColors[u.role] || textColors.user;
}

function setActiveNav(pageId) {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === pageId);
  });
}

// ─── Page Router ─────────────────────────────────────
const pageTitles = {
  'dashboard':'Dashboard','my-numbers':'My Numbers','sms-test':'SMS Test Panel',
  'cdr-stats':'CDR Statistics','analytics':'Analytics','profile':'Profile',
  'admin-dashboard':'Admin Dashboard','users':'User Management','upload-range':'Upload Range',
  'ranges':'Ranges & Stock','allocate':'Allocate Numbers','all-numbers':'All Numbers',
  'traffic-monitor':'Traffic Monitor','deep-analytics':'Deep Analytics',
  'targets':'Targets','settings':'Settings','dev-codes':'Dev Codes',
};

function showPage(name) {
  currentPage = name;
  document.getElementById('page-title').textContent = pageTitles[name] || name;
  setActiveNav(name);
  const content = document.getElementById('page-content');
  content.innerHTML = `<div class="loading-state"><div class="spinner spinner-lg"></div><span>Loading...</span></div>`;
  const pages = {
    'dashboard': pageDashboard,
    'my-numbers': pageMyNumbers,
    'sms-test': pageSmsTest,
    'cdr-stats': pageCdrStats,
    'analytics': pageAnalytics,
    'profile': pageProfile,
    'admin-dashboard': pageAdminDashboard,
    'users': pageUsers,
    'upload-range': pageUploadRange,
    'ranges': pageRanges,
    'allocate': pageAllocate,
    'all-numbers': pageAllNumbers,
    'traffic-monitor': pageTrafficMonitor,
    'deep-analytics': pageDeepAnalytics,
    'targets': pageTargets,
    'settings': pageSettings,
    'dev-codes': pageDevCodes,
  };
  const fn = pages[name];
  if (fn) fn(content);
  else content.innerHTML = `<div class="empty-state"><div class="empty-icon">🚧</div><div class="empty-text">Page not found</div></div>`;
}

// ─── Helpers ──────────────────────────────────────────
function fmt(n) {
  if (n == null) return '—';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return String(n);
}
function fmtNum(n) { return (n||0).toLocaleString(); }
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function fmtDateShort(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function roleBadge(r) {
  const map = { superadmin:'badge-gold', dev:'badge-dev', user:'badge-accent' };
  return `<span class="badge ${map[r]||'badge-neutral'}">${r}</span>`;
}
function statusBadge(active) {
  return active
    ? `<span class="badge badge-success">Active</span>`
    : `<span class="badge badge-danger">Inactive</span>`;
}
function paginationHtml(page, total, per) {
  const pages = Math.ceil(total / per) || 1;
  let html = `<span class="page-info">${fmtNum(total)} records</span>`;
  if (pages <= 1) return html;
  const mkBtn = (n, label='') => {
    const active = n === page ? 'active' : '';
    return `<div class="page-btn ${active}" onclick="changePage(${n})">${label||n}</div>`;
  };
  html += mkBtn(1, '«');
  if (page > 1) html += mkBtn(page-1, '‹');
  for (let i = Math.max(1,page-1); i <= Math.min(pages,page+1); i++) html += mkBtn(i);
  if (page < pages) html += mkBtn(page+1, '›');
  html += mkBtn(pages, '»');
  return html;
}

// ─── Chart Helpers (Canvas API) ──────────────────────
function drawLineChart(canvas, labels, datasets, opts={}) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = (opts.height || 220) * dpr;
  canvas.style.height = (opts.height || 220) + 'px';
  ctx.scale(dpr, dpr);
  const W = canvas.offsetWidth, H = opts.height || 220;
  const pad = { top:20, right:20, bottom:40, left:52 };
  const cW = W - pad.left - pad.right, cH = H - pad.top - pad.bottom;
  ctx.clearRect(0,0,W,H);

  const allVals = datasets.flatMap(d => d.data);
  const maxVal = Math.max(...allVals, 1);
  const minVal = Math.min(...allVals, 0);
  const range = maxVal - minVal || 1;

  const x = i => pad.left + (i / (labels.length-1||1)) * cW;
  const y = v => pad.top + cH - ((v - minVal) / range) * cH;

  // Grid
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.06)';
  const textColor = isDark ? '#5a6478' : '#94a3b8';

  ctx.strokeStyle = gridColor; ctx.lineWidth = 1;
  for (let i=0; i<=4; i++) {
    const yy = pad.top + (cH/4)*i;
    ctx.beginPath(); ctx.moveTo(pad.left,yy); ctx.lineTo(pad.left+cW,yy); ctx.stroke();
    const val = maxVal - (range/4)*i;
    ctx.fillStyle = textColor; ctx.font = '10px JetBrains Mono';
    ctx.textAlign = 'right';
    ctx.fillText(fmt(Math.round(val)), pad.left-6, yy+4);
  }

  // X labels
  ctx.fillStyle = textColor; ctx.font = '10px DM Sans'; ctx.textAlign = 'center';
  const step = Math.ceil(labels.length / 8);
  labels.forEach((l,i) => {
    if (i % step === 0 || i === labels.length-1)
      ctx.fillText(l, x(i), H - pad.bottom + 16);
  });

  // Lines
  datasets.forEach(ds => {
    if (ds.data.length < 2) return;
    ctx.beginPath();
    ctx.strokeStyle = ds.color || '#2563eb';
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ds.data.forEach((v,i) => i===0 ? ctx.moveTo(x(i),y(v)) : ctx.lineTo(x(i),y(v)));
    ctx.stroke();

    // Fill gradient
    ctx.beginPath();
    const grad = ctx.createLinearGradient(0,pad.top,0,pad.top+cH);
    const c = ds.color || '#2563eb';
    grad.addColorStop(0, c+'33');
    grad.addColorStop(1, c+'00');
    ctx.fillStyle = grad;
    ds.data.forEach((v,i) => i===0 ? ctx.moveTo(x(i),y(v)) : ctx.lineTo(x(i),y(v)));
    ctx.lineTo(x(ds.data.length-1), pad.top+cH);
    ctx.lineTo(x(0), pad.top+cH);
    ctx.closePath(); ctx.fill();

    // Dots
    ds.data.forEach((v,i) => {
      ctx.beginPath();
      ctx.arc(x(i),y(v),3,0,Math.PI*2);
      ctx.fillStyle = ds.color || '#2563eb';
      ctx.fill();
    });
  });
}

function drawBarChart(canvas, labels, data, opts={}) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = (opts.height || 180) * dpr;
  canvas.style.height = (opts.height || 180) + 'px';
  ctx.scale(dpr, dpr);
  const W = canvas.offsetWidth, H = opts.height || 180;
  const pad = { top:15, right:15, bottom:35, left:48 };
  const cW = W - pad.left - pad.right, cH = H - pad.top - pad.bottom;
  ctx.clearRect(0,0,W,H);

  const maxVal = Math.max(...data, 1);
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.06)';
  const textColor = isDark ? '#5a6478' : '#94a3b8';
  const barW = cW / labels.length * 0.6;
  const barGap = cW / labels.length;

  ctx.strokeStyle = gridColor; ctx.lineWidth = 1;
  for (let i=0; i<=3; i++) {
    const yy = pad.top + (cH/3)*i;
    ctx.beginPath(); ctx.moveTo(pad.left,yy); ctx.lineTo(pad.left+cW,yy); ctx.stroke();
    ctx.fillStyle = textColor; ctx.font = '10px JetBrains Mono';
    ctx.textAlign = 'right';
    ctx.fillText(fmt(Math.round(maxVal - (maxVal/3)*i)), pad.left-6, yy+4);
  }

  data.forEach((v,i) => {
    const bx = pad.left + barGap*i + (barGap-barW)/2;
    const bh = (v/maxVal)*cH;
    const by = pad.top + cH - bh;
    const color = opts.colors ? opts.colors[i] : (opts.color || '#2563eb');
    const grad = ctx.createLinearGradient(0,by,0,by+bh);
    grad.addColorStop(0, color+'dd');
    grad.addColorStop(1, color+'66');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(bx,by,barW,bh,4) : ctx.rect(bx,by,barW,bh);
    ctx.fill();

    ctx.fillStyle = textColor; ctx.font = '10px DM Sans'; ctx.textAlign = 'center';
    ctx.fillText(labels[i], bx+barW/2, H-pad.bottom+14);
  });
}

function drawDonutChart(canvas, segments, opts={}) {
  const size = opts.size || 160;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = size * dpr; canvas.height = size * dpr;
  canvas.style.width = size+'px'; canvas.style.height = size+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0,0,size,size);
  const cx = size/2, cy = size/2, r = size*0.4, inner = r*0.6;
  const total = segments.reduce((a,s) => a+s.value, 0) || 1;
  let start = -Math.PI/2;
  segments.forEach(s => {
    const sweep = (s.value/total)*Math.PI*2;
    ctx.beginPath();
    ctx.arc(cx,cy,r,start,start+sweep);
    ctx.arc(cx,cy,inner,start+sweep,start,true);
    ctx.closePath();
    ctx.fillStyle = s.color;
    ctx.fill();
    start += sweep;
  });
  // Center text
  if (opts.centerText) {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    ctx.fillStyle = isDark ? '#e8eaf0' : '#0d1017';
    ctx.font = `bold ${size*0.12}px JetBrains Mono`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(opts.centerText, cx, cy);
  }
}

function drawHeatmap(container, data, labels) {
  // data: array of {hour, value} or 2d [day][hour]
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const hours = Array.from({length:24},(_,i)=>i);
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const maxVal = Math.max(...data.flat(), 1);

  container.innerHTML = `
    <div class="heatmap-labels">${hours.map(h=>`<span>${h<10?'0'+h:h}</span>`).join('')}</div>
    <div class="heatmap" style="grid-template-columns:repeat(24,1fr);grid-template-rows:repeat(7,20px);">
      ${days.flatMap((_,d) => hours.map(h => {
        const val = (data[d] && data[d][h]) || 0;
        const intensity = val/maxVal;
        const color = `rgba(37,99,235,${(intensity*0.8+0.05).toFixed(2)})`;
        return `<div class="heatmap-cell" style="background:${color}" title="${days[d]} ${h}:00 — ${val} SMS"></div>`;
      })).join('')}
    </div>
    <div style="display:flex;gap:4px;align-items:center;margin-top:6px;font-size:10px;color:var(--text3);">
      ${days.map(d=>`<span style="width:${100/7}%;text-align:center">${d}</span>`).join('')}
    </div>`;
}

function statCard(label, value, icon, color, delta) {
  const deltaHtml = delta != null ? `
    <div class="stat-delta">
      <span class="${delta>=0?'delta-up':'delta-down'}">${delta>=0?'↑':'↓'} ${Math.abs(delta)}%</span>
      <span style="color:var(--text3)">vs last period</span>
    </div>` : '';
  return `
    <div class="stat-card ${color}">
      <div class="stat-icon">${icon}</div>
      <div class="stat-label">${label}</div>
      <div class="stat-value">${value}</div>
      ${deltaHtml}
    </div>`;
}
function errState(e) {
  return `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">Failed to load</div><div class="empty-sub">${e.message}</div></div>`;
}

async function pageUploadRange(el) {
  el.innerHTML = `
    <div style="max-width:600px;">
      <div class="card fade-up">
        <div class="card-header"><div class="card-title">📤 Upload Number Range</div></div>
        <p style="font-size:13px;color:var(--text2);margin-bottom:20px;">
          Upload a <code>.txt</code> file with one phone number per line. 
          Country and prefix will be auto-detected from the first number.
        </p>
        <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
          <div class="upload-icon">📁</div>
          <div class="upload-text">Click to select or drag & drop</div>
          <div class="upload-sub">.txt file · one number per line</div>
        </div>
        <input type="file" id="file-input" accept=".txt" onchange="fileSelected(this)"/>

        <div id="file-preview" style="display:none;margin-top:16px;">
          <div class="terminal" id="file-preview-content"></div>
        </div>

        <div class="form-group" style="margin-top:16px;">
          <label class="form-label">Range Name (optional — auto-generated if empty)</label>
          <input class="form-input" id="range-name" placeholder="e.g. UK-Vodafone-Batch-01"/>
        </div>
        <div class="form-group">
          <label class="form-label">Default Payout ($)</label>
          <input class="form-input" type="number" step="0.01" id="range-payout" placeholder="0.00"/>
        </div>
        <div class="form-group">
          <label class="form-label">Pay Term (days)</label>
          <input class="form-input" type="number" id="range-payterm" placeholder="30"/>
        </div>
        <button class="btn btn-primary" id="upload-btn" onclick="doUploadRange()">📤 Upload & Import</button>
        <div id="upload-result" style="margin-top:12px;"></div>
      </div>
    </div>`;

  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (f) { document.getElementById('file-input').files = e.dataTransfer.files; fileSelected({files:[f]}); }
  });
}

function fileSelected(input) {
  const f = input.files?.[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split('\n').filter(l=>l.trim());
    const prev = document.getElementById('file-preview');
    const content = document.getElementById('file-preview-content');
    prev.style.display = 'block';
    content.textContent = `✓ ${lines.length} numbers loaded\n\nPreview (first 5):\n${lines.slice(0,5).join('\n')}\n...`;
    document.getElementById('upload-zone').innerHTML = `<div class="upload-icon">✅</div><div class="upload-text">${f.name}</div><div class="upload-sub">${lines.length} numbers</div>`;
  };
  reader.readAsText(f);
}

async function doUploadRange() {
  const fi = document.getElementById('file-input');
  if (!fi.files?.length) { showToast('Select a file first','warning'); return; }
  const btn = document.getElementById('upload-btn');
  btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Uploading...';
  const result = document.getElementById('upload-result');
  try {
    const fd = new FormData();
    fd.append('file', fi.files[0]);
    fd.append('name', document.getElementById('range-name').value);
    fd.append('default_payout', document.getElementById('range-payout').value||'0');
    fd.append('default_payterm', document.getElementById('range-payterm').value||'30');
    const data = await api.upload('/ranges/upload', fd);
    result.innerHTML = `
      <div style="background:var(--success-bg);border:1px solid rgba(5,150,105,.2);border-radius:var(--radius);padding:16px;">
        <div style="color:var(--success);font-weight:700;margin-bottom:8px;">✓ Upload Successful</div>
        <div style="font-size:12px;color:var(--text2);">
          Range: <strong>${data.range?.name}</strong><br/>
          Numbers imported: <strong>${data.count}</strong><br/>
          Country: <strong>${data.range?.country||'Auto-detected'}</strong><br/>
          Prefix: <strong>${data.range?.prefix||'—'}</strong>
        </div>
      </div>`;
    showToast(`${data.count} numbers imported!`,'success');
  } catch(e) {
    result.innerHTML = `<div style="background:var(--danger-bg);border-radius:var(--radius);padding:12px;color:var(--danger);font-size:13px;">✕ ${e.message}</div>`;
    showToast(e.message,'danger');
  } finally {
    btn.disabled = false; btn.innerHTML = '📤 Upload & Import';
  }
}

async function loadTraffic(page=1, silent=false) {
  tmPage = page;
  const q = document.getElementById('tm-q')?.value||'';
  const user_id = document.getElementById('tm-user')?.value||'';
  const from = document.getElementById('tm-from')?.value||'';
  const to = document.getElementById('tm-to')?.value||'';
  const tbody = document.getElementById('tm-tbody');
  const pag = document.getElementById('tm-pag');
  const tot = document.getElementById('tm-total');
  if (!tbody) { if(tmInterval) clearInterval(tmInterval); return; }
  if (!silent) tbody.innerHTML = `<tr><td colspan="9"><div class="loading-state"><div class="spinner"></div></div></td></tr>`;
  try {
    const data = await api.get(`/traffic?page=${page}&per=30&q=${encodeURIComponent(q)}&user_id=${user_id}&from=${from}&to=${to}`);
    const rows = data?.data||[];
    if (tot) tot.textContent = `${fmtNum(data?.total||0)} records`;
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">📡</div><div class="empty-text">No traffic</div></div></td></tr>`;
    } else {
      tbody.innerHTML = rows.map(r => `
        <tr>
          <td><span class="mono">${r.number}</span></td>
          <td>${r.range_name||'—'}</td>
          <td style="font-size:12px">${r.username||'—'}</td>
          <td><span class="mono">${r.cli||'—'}</span></td>
          <td><span class="mono">${fmtNum(r.sms)}</span></td>
          <td><span class="mono">$${r.payout||'0.00'}</span></td>
          <td><span class="mono" style="font-size:11px">${r.ip||'—'}</span></td>
          <td style="font-size:11px;color:var(--text3)">${fmtDate(r.recorded_at)}</td>
          <td><button class="btn btn-danger btn-xs" onclick="deleteTraffic(${r.id})">✕</button></td>
        </tr>`).join('');
    }
    if (pag) pag.innerHTML = paginationHtml(page, data?.total||0, 30);
  } catch(e) { if (!silent) tbody.innerHTML = `<tr><td colspan="9">${errState(e)}</td></tr>`; }
}

let tmTimer;
function tmSearch(v) { clearTimeout(tmTimer); tmTimer = setTimeout(()=>loadTraffic(1),300); }

let autoRefreshOn = true;
function toggleAutoRefresh() {
  autoRefreshOn = !autoRefreshOn;
  document.getElementById('auto-btn').textContent = autoRefreshOn ? '⏸ Auto' : '▶ Auto';
  if (!autoRefreshOn && tmInterval) { clearInterval(tmInterval); tmInterval = null; }
  else if (autoRefreshOn && !tmInterval) {
    tmInterval = setInterval(() => { if (tmPage===1) loadTraffic(1,true); }, 10000);
  }
}

async function deleteTraffic(id) {

  });

  // Auto-login if token exists
  const token = localStorage.getItem(TOKEN_KEY);
  if (token) {
    loadApp().catch(() => {
      document.getElementById('login-screen').style.display = 'flex';
    });
  } else {
    document.getElementById('login-screen').style.display = 'flex';
  }
})();
</script>
</body>
</html>
